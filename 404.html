<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang không còn tồn tại | Comfycare</title>
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://comfycare.vn/san-pham/" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="info-page legacy-page" data-base-path="/" data-current-path="san-pham">
    <main class="content-page" id="top">
      <section class="page-content">
        <div class="container">
          <article class="legacy-notice">
            <h1>Trang đã được cập nhật</h1>
            <p>Nội dung cũ đã ngừng dùng. Anh/chị có thể chuyển đến danh mục phù hợp của Comfycare.</p>
            <div class="legacy-notice__actions">
              <a class="btn btn--primary" href="/san-pham/">Xem sản phẩm hiện tại</a>
              <a class="btn btn--outline" href="/">Về trang chủ</a>
            </div>
          </article>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var path = window.location.pathname.toLowerCase();
        var target = "";

        if (/-p\d+\.html$|-pc\d+\.html$/.test(path)) {
          if (path.indexOf("xo-tat") !== -1 || path.indexOf("phu-kien") !== -1) {
            target = "/phu-kien/";
          } else if (
            path.indexOf("bao-ve-cap-1") !== -1 ||
            path.indexOf("1020mmhg") !== -1 ||
            path.indexOf("cap-1") !== -1
          ) {
            target = "/tat-the-thao-cap-1/";
          } else if (
            path.indexOf("bao-ve-cap-2") !== -1 ||
            path.indexOf("ban-chan-cap-2") !== -1 ||
            path.indexOf("dau-goi") !== -1 ||
            path.indexOf("co-tay") !== -1 ||
            path.indexOf("ban-tay") !== -1 ||
            path.indexOf("khuyu-tay") !== -1
          ) {
            target = "/tat-dai-the-thao-cap-2/";
          } else if (path.indexOf("cap-2") !== -1 || path.indexOf("pc3") !== -1) {
            target = "/tat-y-te-cap-2/";
          }
        }

        if (path.indexOf("gioi-thieu-comfycare") !== -1) {
          target = "/gioi-thieu/";
        } else if (path.indexOf("huong-dan-chon-size") !== -1) {
          target = "/huong-dan-chon-size/";
        } else if (path.indexOf("chinh-sach-doi-size") !== -1) {
          target = "/chinh-sach-doi-tra/";
        } else if (path.indexOf("chinh-sach-van-chuyen") !== -1) {
          target = "/chinh-sach-van-chuyen/";
        } else if (path.indexOf("lien-he-comfycare") !== -1) {
          target = "/lien-he/";
        }

        if (target) {
          window.location.replace(target);
        }
      })();
    </script>
  </body>
</html>
